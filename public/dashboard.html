<link rel="stylesheet" href="style.css">

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2 class="logo">MyApp</h2>

    <ul>
      <li onclick="showSection('addPartner')">Add Partner</li>
      <li onclick="showSection('users')">Users</li>
    </ul>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- ADD PARTNER SECTION -->
    <div id="addPartner" class="section">
      <h2>Add Partner</h2>
      <input id="newUser" placeholder="Username">
      <input id="newPass" placeholder="Password">
      <button onclick="addPartner()">Add</button>
    </div>

    <!-- USERS SECTION -->
    <div id="users" class="section" style="display:none;">
      <h2>User List</h2>
      <button onclick="toggleUsers()">Show Users</button>
      <ul id="userList"></ul>
    </div>

  </div>

</div>

<script src="script.js"></script>
